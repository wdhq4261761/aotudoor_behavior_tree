# GitHub Actions 配置文件
# 实现 Windows 标准版和DD版的自动构建
# 适配模块化架构 v2.3.0
# 使用 RapidOCR 替代 Tesseract

name: AutoDoor BehaviorTree Build and Release

on:
  push:
    branches: [ master, refactor, test, behavior_tree ]
    tags: [ 'autodoor_V*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (major/minor/patch)'
        required: false
        default: 'patch'

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-windows-standard:
    name: Build Windows (Standard)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get version from main.py
      id: get_version
      run: |
        $VERSION = (Select-String -Path "main.py" -Pattern 'VERSION\s*=\s*"V?([0-9]+\.[0-9]+\.[0-9]+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
        Write-Host "Version: $VERSION"
        echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller

    - name: Verify module structure
      run: |
        Write-Host "Verifying module structure..."
        $modules = @("bt_core", "bt_gui", "bt_nodes", "bt_utils", "config")
        foreach ($module in $modules) {
          if (Test-Path "${{ github.workspace }}\$module") {
            Write-Host "OK Module '$module' found"
            Get-ChildItem "${{ github.workspace }}\$module" | Select-Object Name
          } else {
            Write-Host "ERROR Module '$module' not found"
            exit 1
          }
        }

    - name: Verify RapidOCR installation
      run: |
        python -c "import rapidocr; print('RapidOCR version:', rapidocr.__version__)"
        python -c "import onnxruntime; print('ONNX Runtime version:', onnxruntime.__version__)"

    - name: Build Standard Version with PyInstaller
      env:
        AUTODOOR_USE_DD: '0'
      run: pyinstaller autodoor_bt.spec --noconfirm

    - name: Verify build output
      run: |
        $VERSION = (Select-String -Path "main.py" -Pattern 'VERSION\s*=\s*"V?([0-9]+\.[0-9]+\.[0-9]+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
        $EXE_NAME = "autodoor-behaviortree-$VERSION-normal.exe"
        $DIR_NAME = "autodoor-behaviortree-$VERSION-normal"
        
        if (Test-Path "${{ github.workspace }}\dist\$DIR_NAME\$EXE_NAME") {
            Write-Host "OK Build successful: $EXE_NAME found"
            Get-Item "${{ github.workspace }}\dist\$DIR_NAME\$EXE_NAME" | Select-Object Name, Length, LastWriteTime
        } else {
            Write-Host "ERROR Build failed: $EXE_NAME not found"
            Write-Host "Looking for: ${{ github.workspace }}\dist\$DIR_NAME\$EXE_NAME"
            exit 1
          }

    - name: Archive Windows Standard build
      uses: actions/upload-artifact@v4
      with:
        name: autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-normal
        path: dist/autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-normal

  build-windows-dd:
    name: Build Windows (DD Version)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get version from main.py
      id: get_version
      run: |
        $VERSION = (Select-String -Path "main.py" -Pattern 'VERSION\s*=\s*"V?([0-9]+\.[0-9]+\.[0-9]+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
        Write-Host "Version: $VERSION"
        echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller

    - name: Verify module structure
      run: |
        Write-Host "Verifying module structure..."
        $modules = @("bt_core", "bt_gui", "bt_nodes", "bt_utils", "config")
        foreach ($module in $modules) {
          if (Test-Path "${{ github.workspace }}\$module") {
            Write-Host "OK Module '$module' found"
            Get-ChildItem "${{ github.workspace }}\$module" | Select-Object Name
          } else {
            Write-Host "ERROR Module '$module' not found"
            exit 1
          }
        }

    - name: Verify DD driver file
      run: |
        if (Test-Path "${{ github.workspace }}\drivers\DD64.dll") {
          Write-Host "OK DD64.dll found"
          Get-Item "${{ github.workspace }}\drivers\DD64.dll" | Select-Object Name, Length
        } else {
          Write-Host "ERROR DD64.dll not found in drivers directory"
          exit 1
        }

    - name: Verify RapidOCR installation
      run: |
        python -c "import rapidocr; print('RapidOCR version:', rapidocr.__version__)"
        python -c "import onnxruntime; print('ONNX Runtime version:', onnxruntime.__version__)"

    - name: Build DD Version with PyInstaller
      env:
        AUTODOOR_USE_DD: '1'
      run: pyinstaller autodoor_bt_dd.spec --noconfirm

    - name: Verify build output
      run: |
        $VERSION = (Select-String -Path "main.py" -Pattern 'VERSION\s*=\s*"V?([0-9]+\.[0-9]+\.[0-9]+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
        $EXE_NAME = "autodoor-behaviortree-$VERSION-game.exe"
        $DIR_NAME = "autodoor-behaviortree-$VERSION-game"
        
        if (Test-Path "${{ github.workspace }}\dist\$DIR_NAME\$EXE_NAME") {
          Write-Host "OK Build successful: $EXE_NAME found"
            Get-Item "${{ github.workspace }}\dist\$DIR_NAME\$EXE_NAME" | Select-Object Name, Length, LastWriteTime
          if (Test-Path "${{ github.workspace }}\dist\$DIR_NAME\drivers\DD64.dll") {
            Write-Host "OK DD64.dll included in build"
          } else {
            Write-Host "WARN DD64.dll not found in build output"
          }
        } else {
          Write-Host "ERROR Build failed: $EXE_NAME not found"
          Write-Host "Looking for: ${{ github.workspace }}\dist\$DIR_NAME\$EXE_NAME"
          exit 1
          }

    - name: Archive Windows DD build
      uses: actions/upload-artifact@v4
      with:
        name: autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-game
        path: dist/autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-game

  deploy:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build-windows-standard, build-windows-dd]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/autodoor_V')
    permissions:
      contents: write
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Install zip command
      run: sudo apt-get update && sudo apt-get install -y zip

    - name: Get current version from main.py
      id: get_version
      run: |
        VERSION=$(grep -oP 'VERSION\s*=\s*"[Vv]?\K[0-9]+\.[0-9]+\.[0-9]+' main.py | tail -n 1 || echo "")
        
        if [[ -z "$VERSION" ]]; then
          VERSION=$(git tag -l "v*" | sort -V | tail -n 1 | sed 's/^v//' || echo "0.0.0")
        fi
        
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "_TAG=v${VERSION}" >> $GITHUB_OUTPUT
        echo "_autodoor_TAG=autodoor_V${VERSION}" >> $GITHUB_OUTPUT

    - name: Check if need to create tag
      id: check_tag
      run: |
        CURRENT_TAG="v${{ steps.get_version.outputs.VERSION }}"
        AUTODOOR_TAG="${{ steps.get_version.outputs._autodoor_TAG }}"
        
        echo "Current version: $CURRENT_TAG"
        echo "Autodoor tag: $AUTODOOR_TAG"
        
        TAG_EXISTS=$(git tag -l "$AUTODOOR_TAG" | wc -l)
        
        if [[ "$TAG_EXISTS" == "0" ]]; then
          echo "Tag not exists, need to create"
          echo "CREATE_TAG=true" >> $GITHUB_OUTPUT
        else
          echo "Tag already exists, skip creation"
          echo "CREATE_TAG=false" >> $GITHUB_OUTPUT
        fi

    - name: Create tag if needed
      if: steps.check_tag.outputs.CREATE_TAG == 'true'
      run: |
        git config --global user.email "61274520+wdhq4261761@users.noreply.github.com"
        git config --global user.name "wdhq4261761"
        
        TAG_NAME="${{ steps.get_version.outputs._autodoor_TAG }}"
        git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
        git push origin "$TAG_NAME"
        echo "Created and pushed tag: $TAG_NAME"

    - name: Download Windows Standard build
      uses: actions/download-artifact@v4
      with:
        name: autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-normal
        path: windows-normal-build

    - name: Download Windows DD build
      uses: actions/download-artifact@v4
      with:
        name: autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-game
        path: windows-game-build

    - name: Create zip archives
      run: |
        zip -r autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-normal.zip windows-normal-build/
        zip -r autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-game.zip windows-game-build/

    - name: Read update content
      id: read_update_content
      run: |
        if [ -f "UPDATE_CONTENT.md" ]; then
          UPDATE_CONTENT=$(cat UPDATE_CONTENT.md)
          echo "UPDATE_CONTENT<<EOF" >> $GITHUB_OUTPUT
          echo "$UPDATE_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          DEFAULT_CONTENT="AutoDoor BehaviorTree v${{ steps.get_version.outputs.VERSION }}\n\n## Version Description\n- **Normal Version**: Uses PyAutoGUI, suitable for general applications\n- **Game Version**: Uses DD Virtual Keyboard, suitable for DirectInput games\n\n## OCR Engine\n- Uses RapidOCR (based on ONNX Runtime)\n- Faster and more accurate than Tesseract\n- No external dependencies required\n\n## Download Files\n- autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-normal.zip (Normal)\n- autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-game.zip (Game Version)"
          echo "UPDATE_CONTENT<<EOF" >> $GITHUB_OUTPUT
          echo "$DEFAULT_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Create Release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: ${{ steps.read_update_content.outputs.UPDATE_CONTENT }}
        draft: false
        prerelease: false
        files: |
          autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-normal.zip
          autodoor-behaviortree-${{ steps.get_version.outputs.VERSION }}-game.zip
